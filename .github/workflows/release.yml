name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact_name: VideoCompressor-Windows-x64.zip
          - os: ubuntu-latest
            platform: linux
            artifact_name: VideoCompressor-Linux-x64.tar.gz
          - os: macos-latest
            platform: macos
            artifact_name: VideoCompressor-macOS-arm64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0 \
            libdbus-1-3 \
            libxkbcommon0 \
            libxcb-cursor0 \
            libegl1

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build application
        run: python setup.py build

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $buildDir = Get-ChildItem build -Directory | Where-Object { $_.Name -like 'exe.*' } | Select-Object -First 1
          if (-not $buildDir) { throw "Build directory not found" }
          Compress-Archive -Path "$($buildDir.FullName)\*" -DestinationPath "dist\${{ matrix.artifact_name }}"

      - name: Archive (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          BUILD_DIR=$(find build -maxdepth 1 -type d -name 'exe.*' | head -1)
          if [ -z "$BUILD_DIR" ]; then
            echo "Build directory not found"
            exit 1
          fi
          tar -czf "dist/${{ matrix.artifact_name }}" -C "$BUILD_DIR" .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
